name: buckyos
version: "0.6.0"
base_dir: "."

modules:
  node_daemon:
    type: rust
    name: node_daemon
  system_config:
    type: rust
    name: system_config
  verify_hub:
    type: rust
    name: verify_hub
  scheduler:
    type: rust
    name: scheduler
  task_manager:
    type: rust
    name: task-manager
  kmsg:
    type: rust
    name: kmsg
  klog_daemon:
    type: rust
    name: klog_daemon
  smb_service:
    type: rust
    name: smb_service
  repo_service:
    type: rust
    name: repo_service
  buckycli:
    type: rust
    name: buckycli
  node_active:
    type: web
    name: node_active
    src_dir: kernel/node_active/
  control_panel:
    type: rust
    name: control_panel
  aicc:
    type: rust
    name: aicc
  msg_center:
    type: rust
    name: msg_center
  opendan:
    type: rust
    name: opendan
  agent_tool:
    type: rust
    name: agent_tool
  # control_panel_web:
  #   type: web
  #   name: control_panel
  #   src_dir: frame/control_panel/web/
  desktop:
    type: web
    name: desktop
    src_dir: frame/desktop/  
  buckyos_systest:
    type: web
    name: buckyos_systest
    src_dir: apps/sys_test

apps:
  buckyos:
    name: buckyos
    rootfs: rootfs/
    default_target_rootfs: "${BUCKYOS_ROOT}"
    # 安装模式
    # - update 覆盖安装，当目标目录不存在时，会触发重新安装(install_data,update)
    # - install 全新安装，相当于先卸载后安装 (clean,install_data，update)
    
    # 模块指向的 文件/文件夹，每次update的时候都会覆盖更新 
    modules:
      node_daemon: bin/node-daemon/
      system_config: bin/system-config/
      verify_hub: bin/verify-hub/
      scheduler: bin/scheduler/
      task_manager: bin/task-manager/
      kmsg: bin/kmsg/
      klog_daemon: bin/klog-service/
      control_panel: bin/control-panel/
      #control_panel_web: bin/control-panel/web/
      smb_service: bin/smb-service/
      repo_service: bin/repo-service/
      buckycli: bin/buckycli/
      node_active: bin/node-active/
      buckyos_systest: bin/buckyos_systest/
      aicc: bin/aicc/
      msg_center: bin/msg-center/
      opendan: bin/opendan/
      agent_tool: bin/opendan/
      scheduler-etc: etc/scheduler/
      boot-gateway-config: etc/boot_gateway.yaml
      devenv.json: etc/devenv.json
      util.py: bin/util.py
      stop.py: bin/stop.py
      stop.ps1: bin/stop.ps1
      buckyos_jarvis: bin/buckyos_jarvis/
      desktop: bin/control-panel/web/

    # 数据路径，install_data 的时候如果目标存在，则不会复制，否则从rootfs复制到目标(覆盖安装逻辑)
    data_paths: 
    - bin/applist.json
    - etc/node_gateway_info.json
    - etc/user_gateway.yaml
    - etc/post_gateway.yaml
    - etc/node_gateway.json
    - etc/cyfs_gateway.yaml
    - data/               # cyfs://$zone_id/ 映射根: home/, srv/, var/, cache/ 均在此下
    - storage/            # 内核基础设施持久化存储 (chunks, named_store, dRDB)
    - local/              # host-node-local 服务数据
    - logs/

    # 清理路径，uninstall的时候会删除（无需配置:上面所有的modules item都会自动删除)
    # 卸载时不删除: data/home/ (用户数据), data/srv/ (服务持久数据), storage/ (内核存储)
    clean_paths: 
    - data/var/           # 服务运行数据
    - data/cache/         # 服务缓存数据
    - local/              # 服务本地数据
    - logs/
    - etc/                # 系统配置 (删除前自动执行身份备份)

  buckycli:
    name: buckycli
    rootfs: rootfs/bin/buckycli/
    default_target_rootfs: "~/buckycli/"
    modules:
      buckycli: buckycli
    data_paths: []
    clean_paths: []

rust_env:
  OPENSSL_STATIC: '1'

publish:
  macos_pkg:
    apps:
      BuckyOSApp:
        name: BuckyOS Desktop App
        type: bundle # 已经打包好的app bundle
        optional: false
        src: BuckyOS.app # PUBLISH_DIR/$appname/BuckyOS.app
        # Stage into a system location; the pkg postinstall script will copy to the current console user's home.
        default_target: "/Library/Application Support/BuckyOS/BuckyOS.app"
      buckycli:
        name: BuckyOS CLI
        type: app #基于本文件定义的app src rootfs is PUBLISH_DIR/$appname/
        optional: false
        # Stage into a system location; the pkg postinstall script will copy to the current console user's home.
        default_target: "/Library/Application Support/BuckyOS/buckycli/"
      buckyos:
        name: BuckyOS Desktop Service
        type: app #基于本文件定义的app src rootfs is PUBLISH_DIR/$appname/
        optional: true
        default_target: "/opt/buckyos/"
  win_pkg:
    apps:
      BuckyOSApp:
        name: BuckyOS App
        type: bundle 
        optional: false
        src: buckyosapp.exe # PUBLISH_DIR/$appname/buckyosapp.exe
        # Stage into a system location; the pkg postinstall script will copy to the current console user's home.
        default_target: "C:\\Program Files\\BuckyOS\\buckyosapp" #window下运行用户选择安装位置
      buckyos:
        name: BuckyOS Desktop Service
        type: app
        system_service: true,
        optional: true
        default_target: "%APPDATA%\\BuckyOS\\" #window下运行用户选择安装位置

      
      
      
