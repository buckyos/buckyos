process_rule: |

  目标:对当前TODO进行验证,将通过校验的项从 COMPLETE 推进到 DONE,并在失败时进入 ADJUST

  0. **Step连续性规则**
  * 每步先读取 `last_step_summary`,继承上一轮已验证项与未验证项
  * 若上一轮已得到失败结论,本轮优先完成失败落库与行为切换,避免重复检查
  * 本步输出必须明确“检查进度与剩余检查对象”,为下一step提供连续上下文

  1. **检查范围与优先级**
  * 优先检查状态为 `COMPLETE` 的todo
  * 对类型为 `Bench` 且状态为 `WAIT` 的todo,可在本阶段执行基准验证并推进到 `DONE`
  * 若指定了 `params.todo`,优先处理该todo,再决定是否扩展检查范围

  2. **检查原则**
  * CHECK只做验证,不做修复
  * 验证必须有证据:产物内容、命令输出、测试结果、对照验收标准
  * 证据不足时先补充观察,不要直接判定通过

  3. **状态更新规则**
  * 通过:使用todo更新将目标项置为 `DONE` 并写清原因
  * 失败:立即将目标项置为 `CHECK_FAILED`,写清失败原因与证据摘要
  * 严禁将未达到检查条件的普通Task直接置为 `DONE`

  4. **行为切换优先级**
  * 只要出现check失败项,`next_behavior` 设为 `adjust`
  * 无失败且仍有待执行任务时,`next_behavior` 设为 `do`
  * 全部任务已收敛(通常为DONE,或无后续可执行项)时,`next_behavior` 设为 `END`

  5. **输出要求**
  * `thinking` 必须包含:检查对象、证据、结论、分流决策
  * `todo` 必须准确反映状态迁移,状态名使用: WAIT/IN_PROGRESS/COMPLETE/FAILED/DONE/CHECK_FAILED
  * `actions` 仅用于验证和观测,不要用于修复实现

policy: |
  * 必须遵循“先证据,后结论”
  * 必须把失败原因写具体,禁止泛化表述
  * 必须保持CHECK阶段无修复副作用,修复统一交给ADJUST/DO
  * 必须在本轮明确给出下一行为决策


output_protocol:
  mode: behavior_llm_result

toolbox:
  mode: inherit
  tools:
    mode: allow_list
    names:
      - exec
      - read
      - todo_manage
      - worklog_manage
      - load_memory
      - get_session
      - list_session
  default_load_actions:
    - exec
    - read
    - todo_manage
    - worklog_manage

memory:
  total_limt: 24000
  workspace_summary: { limit: 3000, max_percent: 0.18 }
  agent_memory: { limit: 3000, max_percent: 0.2 }
  history_messages: { limit: 6000, max_percent: 0.3 }
  workspace_worklog: { limit: 9000, max_percent: 0.45 }
  session_summaries: { limit: 3000, max_percent: 0.2 }
  workspace_todo: { limit: 11000, max_percent: 0.55 }

input: |
  {{last_step_summary}}
  {{new_msg}}
  {{workspace.todolist.__OPENDAN_ENV(params.todo)__}}
  {{workspace.todolist.next_ready_todo}}
  {{current_todo}}

step_summary: |
  {{llm_result.thinking}}
  {{llm_result.todo}}
  {{llm_result.actions}}
  {{llm_result.action_results}}

faild_back: adjust
step_limit: 16

limits:
  max_prompt_tokens: 20000
  max_completion_tokens: 3200
  max_tool_rounds: 2
  max_tool_calls_per_round: 8
  deadline_ms: 120000

llm:
  model_policy:
    preferred: llm.code

