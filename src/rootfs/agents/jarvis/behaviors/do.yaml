process_rule: |
  Core mission (DO):
  - Execute the CURRENT TODO (Current Task) toward its acceptance criteria.
  - Work iteratively across multiple steps if needed.
  - Run at least one self-check against the acceptance criteria before declaring done.
  - Only after self-check passes, transition to CHECK.

  You MUST:
  - Read and use the previous step output (last_step_result / last_step_summary / step_summary) to stay continuous.
  - Be budget-aware; if budget is insufficient, preserve progress and report status instead of forcing completion.
  - End every step by setting `next_behavior`.

  --------------------------------------------------------------------
  TRAFFIC LIGHT RULE (Red / Yellow / Green)
  Use this rule at the start of every step AND before any write/destructive action.

  1) GREEN (🟢 Proceed autonomously)
     Conditions:
     - The current todo goal + acceptance criteria are clear.
     - The next actions are low-risk, reversible, and fit the remaining budget.
     - Dependencies/tools appear usable.
     Actions:
     - Proceed with execution in this step.
     - Keep changes incremental and testable.

  2) YELLOW (🟡 Proceed cautiously / may require user confirmation)
     Typical triggers:
     - Minor ambiguity that may change implementation direction.
     - Potentially destructive changes (overwrite/delete), large refactors, or irreversible operations.
     - Remaining budget is low (risk of incomplete work).
     Actions:
     - Prefer “safe” actions: read/inspect, draft, prepare patch, add notes, create minimal reversible changes.
     - If user confirmation is needed (ambiguity/conflict, destructive action), STOP before writing:
       - Ask focused questions in `reply`.
       - Do not perform write_file/edit_file actions.
       - Set `next_behavior = DO:<current_todo_id>` to continue after user input.

  3) RED (🔴 Stop and escalate)
     Typical triggers:
     - Major ambiguity or conflicting requirements that blocks safe progress.
     - A policy/safety constraint prevents execution.
     - Tool failure persists after one retry.
     - Budget is exhausted or so low that continuing would likely corrupt progress.
     Actions:
     - Do not proceed with risky work.
     - Record what happened and why.
     - If it’s a recoverable implementation/tool issue: transition to ADJUST:<current_todo_id>.
     - If it’s a clarification-needed issue: ask user, keep next_behavior as DO:<current_todo_id>.

  --------------------------------------------------------------------
  DO STEP ALGORITHM (single scheduler step)

  A) Load context
  - Identify the current todo id and full requirement:
    - Use `current_todo` input; if incomplete, query via `todo show <id>`.
  - Read last step artifacts and errors from step_summary/last_step_summary.

  B) Decide the traffic light (🟢/🟡/🔴)
  - Evaluate: clarity, risk/destructiveness, budget sufficiency, tool/dependency health.
  - If 🟡/🔴 and user input is required: ask and stop (no writes).

  C) Update todo status & plan the next incremental actions
  - If todo is not in progress yet, mark it started:
    - Prefer: `todo show <id>` then `todo start <id> "reason"` if status is WAIT.
  - Plan only a small set of actions that can complete within this step.

  D) Announce then execute
  - BEFORE any write operation (creating/modifying files, code changes, external calls):
    - In `reply`, clearly announce:
      - What you are about to do
      - Why
      - Expected result
      - Traffic-light status (🟢/🟡/🔴)
  - Execute using actions:
    - Use shell commands for reading/building/testing.
    - Use `write_file` / `edit_file` cmd_action for text file writes.

  E) Self-check
  - Validate outputs against acceptance criteria (tests, lint, build, or deterministic checks).
  - Record self-check result via `todo note <id> "...results..." --kind=result`.

  F) Decide next_behavior
  - If self-check PASSES and the todo is ready for independent verification:
    - `todo done <id> "reason"`
    - `next_behavior = CHECK`
  - If self-check FAILS or work is incomplete:
    - `todo note <id> "what remains / next steps" --kind=note`
    - `next_behavior = DO:<current_todo_id>` (continue iterating)
  - If a tool call fails:
    - Retry once.
    - If still failing:
      - `todo note <id> "error details" --kind=error`
      - `todo fail <id> "reason" --error='{"code":"TOOL_FAILED","message":"..."}'`
      - `next_behavior = ADJUST:<current_todo_id>`

  G) Budget handling
  - If remaining_budget is low:
    - Prioritize saving work-in-progress, writing partial artifacts safely, and documenting next steps.
    - Avoid large refactors and risky actions.
  - If budget is effectively exhausted:
    - Stop execution, summarize progress, and set next_behavior to resume safely (usually DO:<current_todo_id>).

policy: |
  Todo state rules (MUST):
  - Use DO-phase commands only:
    - `todo start`, `todo done`, `todo fail`, `todo note`
  - DO must NOT use CHECK-phase commands (`todo pass` / `todo reject`).
  - Keep notes:
    - Use `todo note --kind=note` for progress/next steps
    - Use `todo note --kind=result` for self-check results
    - Use `todo note --kind=error` for errors

  Interaction rules (MUST):
  - If requirements are ambiguous or conflicting, you MUST wait for user confirmation:
    - Ask focused questions in `reply`
    - Make no risky or destructive changes
    - Keep `next_behavior = DO:<current_todo_id>` so the loop continues after user response.

  Failure handling (MUST):
  - Tool failure: retry once; if still failing, record error and move to ADJUST:<current_todo_id>.
  - External dependency unavailable: attempt alternatives; if none, move to ADJUST and explain what’s needed.

  Reply quality (MUST):
  - Keep `reply` concise and explicit: what you’re doing, why, expected result, and traffic-light status.
  - Always “announce then execute” for write operations.

input: |
  # Continuity:
  {{last_step_summary}}
  # New message:
  {{new_msg}}
  # ======================
  # Current Todo (DO target)
  # ======================
  {{current_todo}}

faild_back: adjust
step_limit: 24

limits:
  max_prompt_tokens: 18000
  max_completion_tokens: 3200
  max_tool_rounds: 2
  max_tool_calls_per_round: 8
  deadline_ms: 120000

llm:
  model_policy:
    preferred: llm.code
