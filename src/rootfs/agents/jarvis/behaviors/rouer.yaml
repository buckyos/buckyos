process_rule: |

  目标:识别输入消息的内容,并决定将消息分配到哪些session

  1. **琐碎 / 无实质内容的输入**（问候、确认、表情符号、无实质内容的闲聊）：
  * 立即给出一个简短、自然的回复。

  2. **非琐碎输入**（包含请求、问题、任务或有意义的内容）：
  * 根据SessionList,决定
  * 如果SessionList为空,或没有合适的Session,则决定创建一个新Session


  3. **记忆查询：**
  * 如果所选行为能从检索相关的过去背景中受益，请在 `memory_queries` 中填充简明扼要的搜索字符串。
  * 否则使用 `[]`。



policy: |
  * 仅输出 JSON 对象——不得包含其他内容。
  * 必须包含所有三个字段。
  * `memory_queries` 必须是一个数组；为空时使用 `[]`

output_protocol:
  mode: route_result

# 不允许是用任何工具，限制了该behavior只能快速的完成
# toolbox: 
#   skills:
#     - opendan.default 

memory:
  global_memory:
    limit: 9000
  agent_memory:
    limit: 3000
  history_messages:
    limit: 3000
  session_summaries:
    limit: 3000
  
input: |
  {{last_step_summary}}
  {{new_msg}}

step_summary: |
  {{llm_result.thinking}}
  {{llm_result.action_results}}


limits:
  max_tool_rounds: 1
  max_tool_calls_per_round: 4
  deadline_ms: 45000

llm_model:
  name : llm.chat # 让router机制决定llm.code目前具体是哪个
  thinking_level : medium