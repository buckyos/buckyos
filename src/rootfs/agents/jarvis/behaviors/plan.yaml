process_rule: |

  目标:在PLAN阶段收集必要信息并制定可执行计划(TODO),尽量避免直接产生副作用

  0. **Step连续性规则**
  * 本步必须留下可延续线索:在 `thinking` 中写明“我在这一步里做出的结论和动作”
  * 若计划尚未闭合,不要过早 `END`;为下一step保留推进空间

  1. **识别输入与目标**
  * 综合 `new_msg`、`last_step_summary` 与当前TODO上下文,明确本轮目标、约束、交付物和验收标准
  * 如果需求不完整或存在冲突,优先通过 `reply` 提出最小必要澄清问题

  2. **Workspace决策**
  * 在制定TODO前,必须先判断后续执行是否需要独立的local workspace
  * 若需要workspace,必须在以下三者中做出明确选择:
    - 新建workspace:给出命名(建议是项目名,不要包含动词。下面这两个就不是好的名字`bugfix-xxx`/`feature-xxx`)
    - 复用已有workspace:给出被选workspace及复用理由(目标一致/上下文连续/已有中间产物)
    - 暂不使用workspace:给出理由(任务过小/一次性答复/无需落盘)
  * 若已确定“新建workspace”且信息充分,优先通过 bash 执行 `create_workspace <name> [template]` 完成创建与绑定,并在thinking/todo中记录 workspace_id
  * 若已确定“复用已有workspace”且信息充分,优先通过 bash 执行 `bind_workspace <workspace_id|workspace_path>` 绑定到当前session,并在thinking/todo中记录 workspace_id
  * 若信息不足以决策workspace,优先通过 `reply` 给出选项或最小必要澄清问题,让用户参与决策

  3. **构建计划**
  * PLAN阶段聚焦分析与拆解:给出可执行、可验证、可交付的TODO列表
  * 每个TODO应尽量包含:目标、依赖关系、优先级、完成标准
  * TODO的item_id应该使用T01,T02 这种格式
  * 将可以并行推进的事项拆分为独立TODO;将阻塞事项标注为等待确认/等待输入

  4. **能力与风险判断**
  * 评估当前能力是否足够完成任务(技能/工具/上下文信息)
  * 当能力不足时,先给出替代方案或请求用户授权,不要直接执行高风险动作

  5. **填写next_behavior规则**
  * 已形成可执行计划且可继续推进时,`next_behavior` 设为可以执行的第一个todo `DO:todo=$item_id`
  * 本轮已可直接答复且无需后续动作，或则根据用户的后续信息发现当前session的目标已经实现时,`next_behavior` 设为 `END`
  * 需要等待用户补充信息或授权时,在设置reply的同时,也要将`next_behavior` 设为 `WAIT_FOR_MSG`


  ## 已有的local workspace(可能为空)
  {{local_workspace_list}}

policy: |
  * 目前处于PLAN阶段,文件系只读,不做破坏性变更
  * 必须优先保证计划的可执行性与可验证性,避免空泛建议
  * 必须先完成workspace决策,再输出执行TODO;禁止跳过workspace判断
  * 必须明确写出workspace结论(新建/复用/不使用)及理由;若新建需给出名称
  * 必须显式区分事实与假设,对不确定内容给出说明
  * 必须在Reply中清晰说明当前结论与下一步
  * 必须控制成本:信息足够时立即set next_behavior为可以执行的第一个todo


output_protocol:
  mode: behavior_llm_no_action_result

toolbox:
  load_skills: ["planner"]

# TODO: memory应该加一个不会被裁剪的,用环境变量拼接的段落
memory:
  total_limt: 18000
  agent_memory: { limit: 3500, max_percent: 0.25 }
  session_summaries: { limit: 3000, max_percent: 0.25 }
  session_worklog: { limit: 3000, max_percent: 0.2 }

input: |
  {{last_step_summary}}
  ## 来自用户的新消息
  {{new_msg}}

step_summary: |
  ## Step  {{step_index}} / {{step_limit}} Summary
  ### My Thinking & Decisions
  {{llm_result.thinking}}
  ### Execution Results
  {{llm_result.action_results}}

step_limit: 16

limits:
  max_prompt_tokens: 16000
  max_completion_tokens: 2400
  max_tool_rounds: 1
  max_tool_calls_per_round: 4
  deadline_ms: 300000

llm:
  model_policy:
    preferred: llm.plan
