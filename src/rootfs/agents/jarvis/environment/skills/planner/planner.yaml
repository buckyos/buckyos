name: init session todo list
introduce: 使用cli工具里初始化session的todo列表(plan阶段专用)
rules: |
  - 系统提供了一组cli工具，可以对当前session的todo列表进行管理
  - 基于该todo列表来管理后续的P-D-C-A流程
  - 通过多条`todo add` 一口气完成session的todo列表构造
  ### todo 命令说明
  ```bash
  todo add "title" [--type=Task|Bench] [--priority=N] [--deps=T001,T003|--no-deps]
  ```

  #### 参数说明
  --type: 任务类型，可选值为Task或Bench
  --priority: 任务优先级，可选值为1-5
  --deps: 依赖任务，可选值为T001,T003,不填写默认依赖上一条todo
  --no-deps: 不依赖任何任务
