collections:
  APP_INFO:
    type: json_map
    file_path: ./node_gateway_info.json#app_info
    only_read_file: true
  SERVICE_INFO:
    type: json_map
    file_path: ./node_gateway_info.json#service_info
    only_read_file: true
  NODE_ROUTE_MAP:
    type: json_map
    file_path: ./node_gateway_info.json#node_route_map
    only_read_file: true
  ROUTES:
    type: json_map
    file_path: ./node_gateway_info.json#routes
    only_read_file: true
  TRUST_KEY:
    type: json_map
    file_path: ./node_gateway_info.json#trust_key
    only_read_file: true
  NODE_INFO:
    type: json_map
    file_path: ./node_gateway_info.json#node_info
    only_read_file: true

stacks:
  node_rtcp:
    protocol: rtcp
    bind: 0.0.0.0:2980
    key_path: ./node_private_key.pem
    device_config_path: ./node_device_config.json
    keep_tunnel: []
    hook_point:
      main:
        id: main
        priority: 1
        blocks:
          default:
            id: default
            priority: 1
            block: |
              return "forward ${REQ.protocol}:///${REQ.dest_host}:${REQ.dest_port}";
    # 基于RTCP（包括中转)的身份验证
    # 1） new_http_stream的时候，可以把来源did写入到REQ中供后续使用，但rtcp中转后，只能看到中转节点的did(可以简单的要求中转节点)
    # 2） new_rtcp_stream的时候，是中转，默认只允许zone内中转(来源必须是zone内的设备)

  zone_gateway_http:
    protocol: tcp
    bind: 0.0.0.0:80
    hook_point:
      main:
        priority: 1
        blocks:
          default:
            priority: 1
            block: |
              return "server node_gateway";

  #zone_gateway tls stack is automatically generated by scheduler and write to node_gateway.json

  node_gateway_http:
    protocol: tcp
    bind: 0.0.0.0:3180
    hook_point:
      main:
        priority: 1
        blocks:
          default:
            priority: 1
            block: |
              return "server node_gateway";

servers:
  buckyos_public:
    type: dir
    root_path: ../data/srv/publish/

  node_gateway:
    type: http
    gzip_vary: true
    gzip_types:
      - text/html
      - text/css
      - application/javascript
      - application/json
      - application/xml

    hook_point:
      main:
        blocks:
          default:
            priority: 1
            block: |
              global THIS_NODE_ID=$NODE_INFO.this_node_id;
              global THIS_ZONE_HOST=$NODE_INFO.this_zone_host;
              global CONTROL_PANEL_URL="https://sys.${THIS_ZONE_HOST}/";
              global APP_ID="";
              global SERVICE_ID="";
              if match $REQ.path "/kapi/kevent/*" then
                return --from chain $(exec forward_to_kevent);
              end
              global APP_ID="";
              global SERVICE_ID="";

              if eq $REQ.host "public.${THIS_ZONE_HOST}" then
                return --from chain $(exec forward_to_public);
              end

              exec get_app_info_from_req;
              exec get_service_info_from_req;
              if !eq $SERVICE_ID "" then
                exec permit_check || echo "access service permit check failed" && reject;
                return --from chain $(exec forward_to_service);
              elif !eq $APP_ID "" then
                if eq $(exec check_oauth) true then
                  return --from chain $(exec forward_to_app);
                else
                  echo "oauth failed";
                  local full_url = "https://${REQ.host}/${REQ.uri}";
                  local oauth_login_url=$(append "${CONTROL_PANEL_URL}login?redirect_url=" $(url_encode $full_url));
                  redirect $oauth_login_url;
                end
              end
              echo "reject";
              reject;

          get_app_info_from_req:
            # 尝试通过域名解析得到appid
            # 找到会设置APP_ID和TARGET_APP_INFO
            # host 必须精确匹配 app_id.${THIS_ZONE_HOST} 或 app_id-${THIS_ZONE_HOST} 格式
            priority: 120
            block: |
              app_lookup_key="";
              if eq $REQ.host $THIS_ZONE_HOST then
                app_lookup_key="_";
              elif ends-with $REQ.host ".${THIS_ZONE_HOST}" then
                app_lookup_key=$REQ.host;
                replace $app_lookup_key ".${THIS_ZONE_HOST}" "";
                local expected_host=$(append $app_lookup_key ".${THIS_ZONE_HOST}");
                eq $REQ.host $expected_host || return false;
                map-create hp;
                match-reg --capture hp $app_lookup_key "^([a-zA-Z0-9_]+)\$" || return false;
                eq $hp[1] $app_lookup_key || return false;
              elif ends-with $REQ.host "-${THIS_ZONE_HOST}" then
                app_lookup_key=$REQ.host;
                replace $app_lookup_key "-${THIS_ZONE_HOST}" "";
                local expected_host=$(append $app_lookup_key "-${THIS_ZONE_HOST}");
                eq $REQ.host $expected_host || return false;
                map-create hp;
                match-reg --capture hp $app_lookup_key "^([a-zA-Z0-9_]+)\$" || return false;
                eq $hp[1] $app_lookup_key || return false;
              else
                return false;
              end
              match-include $APP_INFO $app_lookup_key || return false;
              local app_info=$APP_INFO[$app_lookup_key];
              if match-include $app_info "service_id" then
                #echo "app_info is a service ${app_info.service_id}";
                global SERVICE_ID=$app_info.service_id;
                global TARGET_SERVICE_INFO=$app_info;
              else
                #echo "app_info is an app ${app_info.app_id}";
                global APP_ID=$app_info.app_id;
                global TARGET_APP_INFO=$app_info;
              end
              return true;

          get_service_info_from_req:
            # 尝试通过匹配REQ.path 得到 service_id,/kapi/$service_id 或 /kapi/$service_id/*
            # 找到会设置SERVICE_ID和TARGET_SERVICE_INFO
            priority: 130
            block: |
              if match $REQ.path "/1.0/identifiers/*" then
                global SERVICE_ID="system_config";
              elif match $REQ.path "/.well-known/*" then
                global SERVICE_ID="system_config";
              elif match $REQ.path "/sso_callback" then
                global SERVICE_ID="control-panel";
              elif match $REQ.path "/sso_refresh" then
                global SERVICE_ID="control-panel";
              elif match $REQ.path "/sso_logout" then
                global SERVICE_ID="control-panel";
              elif match $REQ.path "/ndm/*" then
                global SERVICE_ID="control-panel";
              else
                map-create krpc_hp;
                match-reg --capture krpc_hp $REQ.path "^/kapi/([a-zA-Z0-9_-]+)(/.*)?" || return false;
                match-include $SERVICE_INFO $krpc_hp[1] || return false;
                global TARGET_SERVICE_INFO=$SERVICE_INFO[$krpc_hp[1]];
                global SERVICE_ID=$krpc_hp[1];
                return $krpc_hp[1];
              end

              match-include $SERVICE_INFO $SERVICE_ID || return false;
              global TARGET_SERVICE_INFO=$SERVICE_INFO[$SERVICE_ID];
              return true;

          check_oauth:
            # 判断是否需要在网关做OAuth2.0认证
            # 当前只对 public app 直接放行，其余 app 依赖 buckyos_session_token
            priority: 135
            block: |
              eq $TARGET_APP_INFO.access_mode "public" && return true;
              local cookies=$(parse-cookie $REQ.Cookie);
              match-include $cookies "buckyos_session_token" || error false;

              capture --value payload --error jwt_error $(verify-jwt $cookies.buckyos_session_token $TRUST_KEY);
              eq $jwt_error false || error false;
              eq $payload.appid $APP_ID || error false;
              return true;

          permit_check:
            # 判断 来源 是否有访问权限
            # 判断 应用是否有权限访问service
            priority: 140
            block: |
              eq $APP_ID "" && return true;
              if match-include $TARGET_APP_INFO "block_services" then
                match-include $TARGET_APP_INFO.block_services $SERVICE_ID && error false;
              end
              return true;

          forward_to_service:
            # 优先使用 forward-plan 形态的 ROUTES（boot 由 node_daemon 生成、运行期由 scheduler 生成），
            # 在 ROUTES 缺失时回退到老的 NODE_ROUTE_MAP，保证 boot 早期或老配置仍可工作。
            priority: 150
            block: |
              if match-include $TARGET_SERVICE_INFO.selector $THIS_NODE_ID then
                local port=$TARGET_SERVICE_INFO.selector[$THIS_NODE_ID].port;
                forward "tcp:///127.0.0.1:${port}";
              else
                map-create primary_peers;
                map-create backup_peers;
                for node_id, node_info in $TARGET_SERVICE_INFO.selector then
                  if match-include $ROUTES $node_id then
                    for route_id, route in $ROUTES[$node_id] then
                      local target_url="${route.url}:${node_info.port}";
                      if eq $route.backup true then
                        map-add backup_peers $target_url $node_info.weight;
                      else
                        map-add primary_peers $target_url $node_info.weight;
                      end
                    end
                  else
                    local target_rtcp_url=${NODE_ROUTE_MAP[$node_id]};
                    if !eq $target_rtcp_url "" then
                      local target_url="${target_rtcp_url}:${node_info.port}";
                      map-add primary_peers $target_url $node_info.weight;
                    end
                  end
                end
                forward round_robin --map $primary_peers --backup-map $backup_peers --group "service:${SERVICE_ID}" --next-upstream "error,timeout" --tries 3;
              end
              echo "forward to service failed";
              reject;

          forward_to_app:
            priority: 160
            block: |
              #echo "forward_to_app block";
              if match-include $TARGET_APP_INFO "dir_pkg_id" then
                call-server $TARGET_APP_INFO.dir_pkg_id;
              else
                eq $TARGET_APP_INFO.node_id $THIS_NODE_ID && forward "tcp:///127.0.0.1:${TARGET_APP_INFO.port}";
                if match-include $ROUTES $TARGET_APP_INFO.node_id then
                  map-create app_primary_peers;
                  map-create app_backup_peers;
                  for route_id, route in $ROUTES[$TARGET_APP_INFO.node_id] then
                    local target_url="${route.url}:${TARGET_APP_INFO.port}";
                    if eq $route.backup true then
                      map-add app_backup_peers $target_url 100;
                    else
                      map-add app_primary_peers $target_url 100;
                    end
                  end
                  forward round_robin --map $app_primary_peers --backup-map $app_backup_peers --group "app:${APP_ID}" --next-upstream "error,timeout" --tries 3;
                else
                  forward "${NODE_ROUTE_MAP[$TARGET_APP_INFO.node_id]}:${TARGET_APP_INFO.port}";
                end
              end

          forward_to_public:
            priority: 170
            block: |
              #echo "forward_to_public block";
              call-server "buckyos_public";

          forward_to_kevent:
            priority: 180
            block: |
              #echo "forward_to_kevent block";
              forward "tcp:///127.0.0.1:3181";
          check_block_list:
            # 通过请求信息判断是否允许访问本zone
            priority: 110
            block: |
              return true;
