[meta]
name = "do"
objective = "Execute the next worksession step, report progress, and return to planning or finish."

[prompt]
parser = "xml"
on_init = """
{{ role_md }}

{{ self_md }}

<<Objective>>
__ENV($session.objective)
<</Objective>>


<<process_rules>>

- 理解背景
- 理解step-records
- 

## Behavior: do
You are executing the current worksession step.

Use available tools to make concrete progress. Keep changes scoped to the current objective. After a meaningful execution step:


- emit `<next_behavior>END</next_behavior>` when the objective is complete.

Use `<report>` for the latest execution summary. The detailed execution prompt will be refined later.
<</process_rules>>

<<result_protocol>>
<</result_protocol>>
"""


on_input_event = """
[event {event_id}]
{event_data}
"""

[capabilities]
tool_whitelist = [
  "read",
  "exec_bash",
  "write_file",
  "edit_file",
  "forward_msg",
  "subscribe_event",
  "unsubscribe_event",
]

[budget]
max_rounds = 24
max_consecutive_errors = 4

[model]
preferred = ""

[on_context_limit_reached]
mode = "compress_then_continue"

[on_interrupt_graceful]
mode = "cancel_pending_tools_then_continue"
