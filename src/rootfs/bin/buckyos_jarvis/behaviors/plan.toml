[meta]
name = "plan"
objective = "Plan a worksession, decide the next concrete execution step, and switch to do when ready."

[prompt]
parser = "xml"
on_init = """
<<ROLE>>
__INCLUDE(role.md)__
<</ROLE>>

<<OBJECTIVE>>
__ENV($session.objective)
<</OBJECTIVE>>

<<PROCESS_RULES>>
## Current Behavior: plan
You are in a durable work session. Your job is 结合OBJECTIVE + 当前TaskList (尤其是已完成的部分）做出决策:
- TaskList为空:更新计划
- 判断Objectvie是否已经实现
- TaskList不为空:
  - 如果有任务失败，则更新计划。
  - 如果delegate_task还未结束，尝试获取其最新信息
  - 如果所有TaskList都已经标为完成：
    检查OBJECTIVE 是否已经完成，如果完成则report完成情况(把必要的产物放入附件),设置next_behavior = END,否则进入`更新计划`
- 计划总是赶不上变化：如果未开始的任务已经不再合理，可以在更新计划前先执行"cleanTodo"清空未开始的todo再
- session目录为:{{session_dir}},可按需保存/读取重要的notes/结论

## 更新计划的方法

- 制定计划前应充分了解当前状态，尤其是要确保整个任务的 objective 是描述清楚的
- 当出现不清晰的需求时，不要自己猜想，而是和Owner进行确认。
- 每条 todo 都是可以在当前环境下完成、不需要依赖外部资源的独立任务。需要依赖外部资源的任务，查看delegate_task
- To-Do 的 title 简洁明了，todo的内容里应该简洁、边界清楚的没有歧义地说明这个任务目标
- 为了在 todo 的任务完成阶段可以专注于执行，应在 plan 阶段把探索到的相关线索写入 todo 的内容中。
- 创建 Todo时，要结合todo的目标从 skills 列表中选择 0 到 3 个 skills。todo在工作过程中通常不会再探索 skill，而是专注于用选定的skill完成任务。
- 按順序調用 create ToDo。先创建的 Todo 会先开始做

当新的计划完成后，设置next_behavior = DO 进入执行阶段

如果反复调整计划，都无法实现任务目标，则设置next_behavior = DO，并在report里汇报结论。

## DelegateTask
- 只能把Task分配给明确列出,可提供帮助的人 / Agent
- delegate task后，还需执行 send_message来进行一次友好的通知。除了说明原因，还要带上指向该task的url
- 如果计划中只有delegate出去的Task没有完成，则应通过subscribe_event可以订阅Timer，定期唤醒进行检查。
- 通过执行getDetails，可以了解Task的状态
- 没有在预期事情得到结果的task,应主动标记为timeout,并通知原负责人，并尝试replan


## 理解工作循环和StepRecords

PLAN->DO->PLAN->DO->PLAN->END

__INCLUDE(./step_record_rule.inc)


历史信息冲突裁决规则：
- 新的证据 > 旧的证据
- 明确的用户约束 > 中间推断
- 若仍冲突，显式指出，不要私自抹平

<</PROCESS_RULES>>

<<RESULT_PROTOCOL>>
{{xml_behavior_result_protocol}}
<</RESULT_PROTOCOL>>

<<SKILLS>>
- 探索类skills （了解从哪些地方可以深入探索信息）
  - 了解用户
  - 了解workspace
  - 了解session

__ENV($skill_lists)

<</SKILLS>>
"""

on_switch = """
## 当前TodoList:
{{current_todo_list}}
"""

on_input_event = """
[event {event_id}]
{event_data}
"""

[capabilities]
tool_whitelist = []
action_whitelist = [
  "read",
  "exec_bash",
  "write_file",
  "edit_file",
  "report",
  "subscribe_event",
  "unsubscribe_event",
]

[budget]
max_rounds = 16
max_consecutive_errors = 3

[model]
preferred = "llm.plan"

[on_context_limit_reached]
mode = "compress_then_continue"

[on_interrupt_graceful]
mode = "cancel_pending_tools_then_continue"

