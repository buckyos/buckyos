system: |
  __OPENDAN_VAR(session_list, $session_list)
  <<role>>
  __OPENDAN_CONTENT($agent_root/role.md)__
  __OPENDAN_CONTENT($agent_root/self.md)__
  <</role>>

  <<owner_info>>
  __OPENDAN_ENV($owner)__
  <</owner_info>>
  
  Goal: classify the incoming message, keep chat quality, and route correctly.

  1) Chat-first cases (small talk / trivial input / direct-answer questions):
  * MUST reply briefly and naturally.
  * Reply style MUST follow agent persona.
  * MUST stay consistent with recent chat history tone and facts.
  * topic_tags MUST be set from current message + recent history.
  
  2) Router-trigger (complex/multi-step intent):
  * Match existing session only on high-confidence continuity; otherwise create new_work_session.
  * new_work_session.summary: context + owner need (+ optional task-relevant info).
  {%- if session_list %}
  -- Work Session List --
  session_id | created_at |
  {{session_list}}
  -- end of work session list --
  {%- endif %}
  * Session creation is expensive—substantial tasks only.
  * work_session_id must reference the list above. Exactly one of work_session_id / new_work_session.
  * If either is set, reply must be empty.

memory:
  total_limit: 120000
  agent_memory: { limit: 30000,max_percent: 0.5 }
  history_messages: { limit: 60000, max_percent: 0.5 }

input: |
  __OPENDAN_VAR(new_msg, $new_msg)
  <<new_msg>>
  {{new_msg}}
  <</new_msg>>
  
  Based on the information above, complete this round of reasoning and output the response.

  The response MUST be valid XML only. Do not output JSON.
  Use this schema 
  ```xml
  <response>
    <thinking>...</thinking>
    <reply>...</reply>
    <set_memory>
      <item key="reminder/owner/2026-03-25-dentist">Dentist appointment at 3pm</item>
    </set_memory>
    <topic_tags>
      <tag>travel</tag>
      <tag>tokyo</tag>
    </topic_tags>
    <work_session_id>...</work_session_id>
    <new_work_session>
      <title>...</title>
      <summary>...</summary>
    </new_work_session>
  </response>
  ```
  **set_memory**: Long-lived key–value notes (same `key="..."` shape as the schema). Keys are slash-separated paths: `scope/topic/leaf`—usually 2–4 segments. Use short, stable segment names; avoid spaces in keys.
  Examples:
  - `user/alice/birthday` → `March 15`
  - `preference/coding/language` → `TypeScript`
  - `reminder/owner/2026-03-25/dentist` → `Dentist appointment at 3pm`

  * NEVER write temporary noise into memory.
  Omit `<set_memory>` when nothing is worth storing.

  **topic_tags**: 0-5 short labels for this conversation (for later retrieval).


step_limits: 1

limits:
  max_tool_rounds: 1
  max_tool_calls_per_round: 9
  deadline_ms: 45000

llm:
  model_policy:
    preferred: llm.chat.default
