# Required
gateway_host = "http://{endpoint}"
# Optional: if omitted, fallback to gateway_host
krpc_host = "http://{endpoint}"
aicc_client_host = "http://{endpoint}"

# Optional direct token; if empty, runner will try username/password login.
[auth]
token = ""
username = "your username"
password = "your password"
login_appid = "buckycli"

[runner]
model_alias = "llm.plan.default"
app_id = "aicc-tests"
output = "reports/aicc_remote_report.md"
rust_manifest_path = "rust_runner/Cargo.toml"

# sn-openai is always executed and does not need api key.
# openai/gemini/claude are executed only if key is provided.
[api_keys]
openai = ""
gemini = ""
claude = ""
