[package]
name = "aicc-remote-rust-runner"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.49.0", features = ["rt-multi-thread", "macros"] }
clap = { version = "4.5.54", features = ["derive"] }
kRPC = { git = "https://github.com/buckyos/buckyos-base.git", package = "kRPC", branch = "main" }
buckyos-api = { path = "../../../src/kernel/buckyos-api" }
