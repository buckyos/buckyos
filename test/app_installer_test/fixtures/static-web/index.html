<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Installer Static Fixture</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Space Grotesk", "Work Sans", sans-serif;
        background: linear-gradient(135deg, #f4f8f7, #ffffff);
        color: #0f172a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(640px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid #d7e1df;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 20px 48px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #52606d;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Static Web Fixture</h1>
      <p>This package is published locally and installed through app_installer.</p>
    </main>
  </body>
</html>
