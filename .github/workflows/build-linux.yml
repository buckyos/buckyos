name: Build Buckyos Linux Components
on: 
    workflow_call:
        inputs:
            arch:
                required: true
                type: string
            enable_tests:
                required: false
                type: boolean
                default: false

jobs:
  build:
    name: build
    runs-on: ${{ inputs.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: "latest"
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{inputs.arch}}-unknown-linux-${{inputs.arch == 'aarch64' && 'gnu' || 'musl'}}
    - name: Setup Needed Packages
      if: ${{ inputs.arch == 'x86_64' }}
      run: |
          sudo apt update
          sudo apt install -y musl-tools
    - name: cargo test
      working-directory: ./src
      if: ${{inputs.enable_tests == 'true'}}
      run: cargo test -- --test-threads=1
    - name: install buckyos devkit
      run: pip install "buckyos-devkit @ git+https://github.com/buckyos/buckyos-devkit.git"
    - name: build buckyos
      working-directory: ./src
      run: buckyos-build
    - name: Get Version
      id: get_version
      run: |
        full_version=`./src/rootfs/bin/node-daemon/node_daemon --version|grep -oP '\d+(?:\.\d+)*\+build\S+'`
        echo "full_version=$full_version" >> $GITHUB_OUTPUT
        short_version=`./src/rootfs/bin/node-daemon/node_daemon --version|grep -oP '\d+(?:\.\d+)*\+build\d+'`
        echo "short_version=$short_version" >> $GITHUB_OUTPUT
    - name: Tar Rootfs
      run:
        cd ./src/rootfs && tar -cvf ../../rootfs.tar .
    - name: Prepare tools
      run: |
        mkdir -p tools
        cp ./src/rootfs/bin/buckycli/buckycli ./tools/
    - name: Upload tools
      uses: actions/upload-artifact@v6
      with:
        name: buckyos-tools-linux-${{inputs.arch == 'x86_64' && 'amd64' || 'aarch64'}}-${{steps.get_version.outputs.short_version}}
        path: tools
        if-no-files-found: error
    - name: Upload
      uses: actions/upload-artifact@v6
      id: upload
      with:
        name: buckyos-linux-${{inputs.arch == 'x86_64' && 'amd64' || 'aarch64'}}-${{steps.get_version.outputs.short_version}}
        path: rootfs.tar
        if-no-files-found: error
    - name: Report Upload Urls
      run: |
        npm install @buckyos/test-server-client
        npx test-server-client seturl buckyos ${{steps.get_version.outputs.short_version}} linux ${{inputs.arch}} ${{steps.upload.outputs.artifact-url}} ${{github.sha}}
      env:
        USERNAME: ${{ secrets.TEST_SERVER_USERNAME }}
        PRIVATE_KEY: ${{ secrets.TEST_SERVER_PRIVATE_KEY }}
        ENDPOINT: "https://buckyos.ai"

